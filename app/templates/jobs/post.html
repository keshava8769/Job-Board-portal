{% extends 'base.html' %}
{% block title %}Post a Job{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <h3 class="fw-bold mb-1"><i class="bi bi-plus-circle me-2"></i>Post a New Job</h3>
        <p class="text-muted small mb-4">Fill in the details below to publish your job listing</p>

        <form method="POST" action="{{ url_for('jobs.post_job') }}">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Job Title *</label>
              <input type="text" name="title" class="form-control"
                     placeholder="e.g. Python Developer" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Company Name *</label>
              <input type="text" name="company" class="form-control"
                     placeholder="e.g. TechCorp India" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Location</label>
              <input type="text" name="location" class="form-control"
                     placeholder="e.g. Hyderabad / Remote">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Job Type</label>
              <select name="job_type" class="form-select">
                <option value="">Select type</option>
                <option value="full-time">Full-Time</option>
                <option value="part-time">Part-Time</option>
                <option value="internship">Internship</option>
                <option value="freelance">Freelance</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Salary / Stipend</label>
              <input type="text" name="salary" class="form-control"
                     placeholder="e.g. ₹5-8 LPA">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Job Description *</label>
              <textarea name="description" class="form-control" rows="6"
                        placeholder="Describe the role, responsibilities, requirements..."
                        required></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Skills / Tags</label>
              <input type="text" name="tags" class="form-control"
                     placeholder="e.g. python, flask, sql, git  (comma separated)">
              <small class="text-muted">Separate skills with commas</small>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success px-4 fw-semibold">
              <i class="bi bi-check-circle me-1"></i> Publish Job
            </button>
            <a href="{{ url_for('jobs.list_jobs') }}" class="btn btn-outline-secondary px-4">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
