{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow border-0 rounded-4 mt-3">
      <div class="card-body p-4">
        <h3 class="card-title text-center fw-bold mb-1">Create Account</h3>
        <p class="text-center text-muted small mb-4">Join JobBoard today</p>

        <form method="POST" action="{{ url_for('auth.signup') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">I am a...</label>
            <select name="role" class="form-select" required>
              <option value="" disabled selected>Select your role</option>
              <option value="student">Student / Job Seeker</option>
              <option value="recruiter">Recruiter / Employer</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-person-plus me-1"></i> Create Account
          </button>
        </form>

        <hr class="my-3">
        <p class="text-center small mb-0">
          Already have an account?
          <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
