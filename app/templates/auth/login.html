{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow border-0 rounded-4 mt-3">
      <div class="card-body p-4">
        <h3 class="card-title text-center fw-bold mb-1">Welcome Back</h3>
        <p class="text-center text-muted small mb-4">Log in to your JobBoard account</p>

        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Your password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i> Login
          </button>
        </form>

        <hr class="my-3">
        <p class="text-center small mb-0">
          Don't have an account?
          <a href="{{ url_for('auth.signup') }}" class="text-primary fw-semibold">Sign up free</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
